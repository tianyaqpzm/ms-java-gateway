name: Build MS Java Gateway DockerImage

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master  # 向主分支发起PR时触发
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            tianyaqpzm/ms-java-gateway
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'pull_request' && github.base_ref == 'master' && startsWith(github.head_ref, 'feature_'))
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.VPS_USERNAME }} 
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.PORT || 22 }}
          script: |
            # 停止并删除旧容器
            docker stop ms-java-gateway || true
            docker rm ms-java-gateway || true
            
            # 拉取最新镜像
            docker pull tianyaqpzm/ms-java-gateway:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'master' }}
            
            # 启动新容器
            docker run -d \
              --name ms-java-gateway \
              --restart unless-stopped \
              --network pei-network \
              --expose 8281 \
              --add-host "tao-lan.122577.xyz:host-gateway" \
              -e TZ=Asia/Shanghai \
              -e NACOS_SERVER_ADDR=${{ secrets.NACOS_SERVER_ADDR }} \
              -e NACOS_USERNAME=${{ secrets.NACOS_USERNAME }} \
              -e NACOS_PASSWORD=${{ secrets.NACOS_PASSWORD }} \
              -e NACOS_NAMESPACE=${{ vars.NACOS_NAMESPACE }} \
              tianyaqpzm/ms-java-gateway:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'master' }}
            
            # 清理无用镜像
            docker image prune -af
