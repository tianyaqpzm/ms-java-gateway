spring:
  application:
    name: ms-java-gateway
  profiles:
    active: ${ENV_TYPE:prod}
  cloud:
    nacos:
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}
      server-addr: ${NACOS_SERVER_ADDR}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}
        namespace: ${NACOS_NAMESPACE}
        group: DEFAULT_GROUP
        timeout: 10000
      config:
        server-addr: ${NACOS_SERVER_ADDR}
        namespace: ${NACOS_NAMESPACE}
        group: DEFAULT_GROUP
        timeout: 10000
        file-extension: yaml
        import-check:
          enabled: true
    gateway:
      discovery:
        locator:
          enabled: true # Enable discovery locator to automatically create routes for registered services
          lower-case-service-id: true
      routes:
        # Example route
        - id: dark_route
          uri: https://dark.org
          predicates:
            - Path=/dark/**