server:
  port: 8281
  # 告诉 Spring 信任 Nginx 传来的 X-Forwarded-* 头部
  forward-headers-strategy: native
management:
  endpoints:
    web:
      base-path: "/actuator" # 这样访问路径就会变成 /actuator/health
      exposure:
        include: 'health'

spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}
      config:
        server-addr: ${NACOS_SERVER_ADDR}
        file-extension: yaml
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        # Business Route: Forward /api/business/** to business-service
        - id: business-route
          uri: lb://business-service
          predicates:
            - Path=/api/business/**
          filters:
            - StripPrefix=2

        # Agent Route: Forward /rest/dark/v1/agent/** to python-agent
        # ⚠️ 必须在 timekeeper-route 之前声明，否则 /rest/dark/v1/** 会先匹配
        - id: agent-route
          uri: lb://python-agent
          predicates:
            - Path=/rest/dark/v1/agent/**
          filters:
            - StripPrefix=0

        # TimeKeeper Route: Forward /rest/dark/v1/** to ai-langchain4j (业务后端)
        - id: timekeeper-route
          uri: lb://ai-langchain4j
          predicates:
            - Path=/rest/dark/v1/**
          filters:
            - StripPrefix=0
        
  security:
    login-url: /oauth2/authorization/casdoor
    oauth2:
      client:
        registration:
          casdoor:
            provider: casdoor
            client-id: df6a2403823b8f014be5
            client-secret: ${CASDOOR_SECRET:1234567890}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile,email
        provider:
          casdoor:
            # Casdoor 的 OIDC 发现地址 (Discovery Endpoint)
            # 在测试环境下不配置 issuer-uri 以禁用 OIDC 发现，配置在 application-prod.yml 中

app:
  # 本地运行的 Angular 默认地址
  frontend-url: ${FRONTEND_URL:https://122577.xyz}
  cookie-domain: ${COOKIE_DOMAIN:122577.xyz}
  jwt:
    # openssl rand -base64 32
    secret: ${JWT_SECRET:your-256-bit-secret-your-256-bit-secret}
  security:
    ignore:
      urls:
        - /api/public/**
        - /favicon.ico
        - /actuator/health
        - /api/test/**
        - /login/**
        - /error
        - /oauth2/**
        - /logout

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG