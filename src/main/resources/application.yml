server:
  port: 8281
  # 告诉 Spring 信任 Nginx 传来的 X-Forwarded-* 头部
  forward-headers-strategy: native
management:
  endpoints:
    web:
      base-path: "/actuator" # 这样访问路径就会变成 /actuator/health
spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR}
      config:
        server-addr: ${NACOS_SERVER_ADDR}
        file-extension: yaml
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        # Business Route: Forward /api/business/** to business-service
        - id: business-route
          uri: lb://business-service
          predicates:
            - Path=/api/business/**
          filters:
            - StripPrefix=2

        # Agent Route: Forward /rest/dark/v1/agent/** to python-agent
        # ⚠️ 必须在 timekeeper-route 之前声明，否则 /rest/dark/v1/** 会先匹配
        - id: agent-route
          uri: lb://python-agent
          predicates:
            - Path=/rest/dark/v1/agent/**
          filters:
            - StripPrefix=0

        # TimeKeeper Route: Forward /rest/dark/v1/** to ai-langchain4j (业务后端)
        - id: timekeeper-route
          uri: lb://ai-langchain4j
          predicates:
            - Path=/rest/dark/v1/**
          filters:
            - StripPrefix=0
        
        # LLM Proxy Route: Forward /v1/chat/** to OpenAI/DeepSeek
        - id: llm-proxy-route
          uri: https://api.openai.com
          predicates:
            - Path=/v1/chat/**
          filters:
            - name: AiBillingFilter

        # # Gemini Proxy Route
        # - id: gemini-route
        #   uri: https://generativelanguage.googleapis.com
        #   predicates:
        #     - Path=/gemini/**
        #   filters:
        #     - StripPrefix=1
        #     - AddRequestParameter=key, ${GEMINI_API_KEY}
  security:
    login-url: /oauth2/authorization/casdoor
    ignore:
      urls:
        - /api/public/**
    oauth2:
      client:
        registration:
          casdoor:
            provider: casdoor
            client-id: df6a2403823b8f014be5
            client-secret: ${CASDOOR_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid,profile,email
        provider:
          casdoor:
            # Casdoor 的 OIDC 发现地址 (Discovery Endpoint)
            issuer-uri: https://tao-lan.122577.xyz:8381
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
app:
  # 本地运行的 Angular 默认地址
  frontend-url: ${FRONTEND_URL}
  jwt:
    # openssl rand -base64 32
    secret: ${JWT_SECRET}