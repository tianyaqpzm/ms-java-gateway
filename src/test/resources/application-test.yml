spring:
  security:
    login-url: /oauth2/authorization/casdoor
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: localhost:8848
      config:
        enabled: false
        server-addr: localhost:8848
        import-check:
          enabled: false
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: test_route
          uri: http://127.0.0.1:8080
          predicates:
            - Path=/api/test/**

app:
  security:
    ignore:
      urls:
        - /api/public/**
        - /favicon.ico
        - /actuator/health
        - /login/**
        - /error
        - /oauth2/**
        - /logout
  frontend-url: https://test.example.com
  cookie-domain: example.com
  jwt:
    secret: test-secret-key-must-be-at-least-256-bits-long!!

logging:
  level:
    root: WARN
    com.dark.gateway: DEBUG
